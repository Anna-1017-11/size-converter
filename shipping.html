<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跨境运费估算器 - 国际物流运费查询</title>
<meta name="description" content="跨境电商运费估算器，支持国际快递、空运、海运、铁路运费估算，从中国发往全球。">
<style>
:root{--c1:#1a1a2e;--c2:#00b894}
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#1a1a2e;line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto;padding:0 16px}
header{text-align:center;padding:28px 0 12px}
header h1{font-size:1.3rem;font-weight:700;letter-spacing:-.3px}
header p{margin-top:4px;font-size:.82rem;color:#888}
.nav-bar{display:flex;gap:6px;background:#f0f2f7;border-radius:14px;padding:5px;margin:12px 0 0;justify-content:center}.nav-bar a{flex:1;text-align:center;text-decoration:none;padding:8px 6px;border-radius:10px;font-size:.78rem;font-weight:600;color:#999;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:4px}.nav-bar a:hover{color:#666;background:rgba(255,255,255,.5)}.nav-bar a.active{background:#fff;color:var(--c1);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:700}.nav-bar a svg{width:15px;height:15px;flex-shrink:0}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:20px;margin-bottom:14px}
.card h2{font-size:1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:7px}
.card h2 svg{width:18px;height:18px;color:var(--c2);flex-shrink:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row.three{grid-template-columns:1fr 1fr 1fr}
.g{display:flex;flex-direction:column;gap:3px}
.g label{font-size:.75rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.3px}
.g input,.g select{padding:9px 11px;border:1.5px solid #e8eaf0;border-radius:8px;font-size:.9rem;background:#fafbfc;outline:none;width:100%;transition:all .2s}
.g input:focus,.g select:focus{border-color:var(--c2);background:#fff;box-shadow:0 0 0 3px rgba(0,184,148,.1)}
.g input[readonly]{font-weight:700;color:#1a1a2e;cursor:default;background:#f8f9fc;text-align:center;font-size:.95rem}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.method-card{border:1.5px solid #e8eaf0;border-radius:10px;padding:14px;text-align:center;transition:all .3s;background:#fff}
.method-card:hover{border-color:var(--c2);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.method-card .name{font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px}
.method-card .price{font-size:1.3rem;font-weight:800;color:var(--c2)}
.method-card .detail{font-size:.72rem;color:#888;margin-top:3px}
.method-card .tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600;margin-top:5px}
.tag.fast{background:#ffeaa7;color:#b7950b}
.tag.normal{background:#dfe6e9;color:#636e72}
.tag.slow{background:#fab1a0;color:#c0392b}
.tag.best{background:#55efc4;color:#006266}
.tip{font-size:.78rem;color:#888;background:#f8f9fc;padding:8px 12px;border-radius:8px;margin-top:10px;line-height:1.5}
footer{text-align:center;padding:20px 0;color:#aaa;font-size:.78rem}
footer a{color:#aaa;text-decoration:none}
@media(max-width:600px){.row,.row.three{grid-template-columns:1fr}.result-grid{grid-template-columns:1fr}.card{padding:14px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>跨境运费估算器</h1>
<p>国际快递 · 空运 · 海运 · 铁路 — 从中国发往全球</p>
<div class="nav-bar"><a href="./"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 17h18l1-5-3-6-9 2-3 5H3"/><path d="M3 17v2"/><path d="M21 17v2"/></svg>尺寸换算</a><a href="./duty.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="10"/></svg>关税计算</a><a href="./shipping.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>运费估算</a></div>
</header>

<div class="card">
<h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>运费计算</h2>
<div class="row">
<div class="g"><label>发货地</label>
<select id="fromP">
<option value="sz">🇨🇳 深圳</option><option value="sh">🇨🇳 上海</option><option value="gz">🇨🇳 广州</option>
<option value="nb">🇨🇳 宁波</option><option value="bj">🇨🇳 北京</option>
</select>
</div>
<div class="g"><label>目的地</label>
<select id="toCtr">
<option value="us">🇺🇸 美国</option><option value="eu">🇪🇺 欧盟</option><option value="uk">🇬🇧 英国</option>
<option value="jp">🇯🇵 日本</option><option value="kr">🇰🇷 韩国</option><option value="au">🇦🇺 澳大利亚</option>
<option value="ca">🇨🇦 加拿大</option><option value="br">🇧🇷 巴西</option><option value="ae">🇦🇪 阿联酋</option>
<option value="sg">🇸🇬 新加坡</option><option value="in">🇮🇳 印度</option><option value="th">🇹🇭 泰国</option>
</select>
</div>
</div>
<div class="row three">
<div class="g"><label>重量 (kg)</label><input type="number" id="w" value="1" min="0.1" step="0.1"></div>
<div class="g"><label>长 (cm)</label><input type="number" id="l" value="30" min="1" step="1"></div>
<div class="g"><label>宽 (cm)</label><input type="number" id="wi" value="20" min="1" step="1"></div>
</div>
<div class="g" style="margin-bottom:5px"><label>高 (cm)</label><input type="number" id="h" value="15" min="1" step="1"></div>

<div class="result-grid" id="resultGrid"></div>
<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:.8rem;color:#856404;display:flex;gap:8px;align-items:flex-start"><span style="font-size:1.1rem">⚠️</span><span><strong>重要提醒：</strong>以上为预估算价格，实际运费以物流商最终报价为准。</span></div><div class="tip">💡 体积重 = 长×宽×高÷5000，计费重量取实际重量与体积重的较大值。价格为估算。</div>
</div>
</div>
<footer>跨境运费估算器 &copy; 2026 · <a href="./">📐 尺寸换算</a> · <a href="./duty.html">💰 关税</a> · <a href="privacy.html">隐私</a> · <a href="disclaimer.html">免责声明</a></footer>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx" crossorigin></script>
<script>
var sr={us:{ex:[18,14,10],air:[8,5.5,4.5],sea:80,rail:0},eu:{ex:[16,12,9],air:[6.5,4.5,3.5],sea:65,rail:4.5},uk:{ex:[17,13,9.5],air:[7,5,4],sea:70,rail:4.8},jp:{ex:[10,8,6],air:[4,3,2.5],sea:45,rail:0},kr:{ex:[9,7,5.5],air:[3.5,2.5,2],sea:40,rail:0},au:{ex:[15,11,8],air:[6,4.5,3.5],sea:60,rail:0},ca:{ex:[18,14,10],air:[7.5,5.5,4.5],sea:75,rail:0},br:{ex:[30,25,20],air:[12,9,7],sea:120,rail:0},ae:{ex:[14,11,8],air:[5.5,4,3],sea:55,rail:0},sg:{ex:[10,8,6],air:[3.5,2.5,2],sea:40,rail:0},in:{ex:[12,10,8],air:[5,3.5,3],sea:50,rail:0},th:{ex:[11,9,7],air:[4,3,2.5],sea:45,rail:0}};
var $=function(i){return document.getElementById(i)};
function calc(){var to=$(toCtr).value,w=parseFloat($(w).value)||1,l=parseFloat($(l).value)||0,wi=parseFloat($(wi).value)||0,h=parseFloat($(h).value)||0;var vw=l*wi*h/5000,c=Math.max(w,vw);var d=sr[to];if(!d)return;function p(a){if(c<=10)return a[0];if(c<=50)return a[1];return a[2]};var ex=p(d.ex)*c,air=p(d.air)*c,sea=d.sea*(l*wi*h/1000000),rail=d.rail?d.rail*c:0;var fm=function(n){return "$"+n.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g,",")};var tags={ex:"<span class=tag\\ fast>最快</span>",air:"<span class=tag\\ normal>经济</span>",sea:"<span class=tag\\ slow>最慢</span>",rail:"<span class=tag\\ best>性价比</span>"};$(resultGrid).innerHTML='<div class=method-card><div class=name>✈️ 国际快递</div><div class=price>'+fm(ex)+'</div><div class=detail>3-7天 · 门到门</div>'+tags.ex+'</div><div class=method-card><div class=name>🛩️ 空运</div><div class=price>'+fm(air)+'</div><div class=detail>7-15天 · 港到港</div>'+tags.air+'</div><div class=method-card><div class=name>🚢 海运</div><div class=price>'+fm(sea)+'</div><div class=detail>30-45天 · 港到港</div>'+tags.sea+'</div>'+(d.rail?'<div class=method-card><div class=name>🚂 铁路</div><div class=price>'+fm(rail)+'</div><div class=detail>15-20天 · 门到门</div>'+tags.rail+'</div>':'')}
document.addEventListener("DOMContentLoaded",function(){calc();["fromP","toCtr","w","l","wi","h"].forEach(function(i){$(i).addEventListener("input",calc)})});
</script>
</body>
</html>
