<style>
:root{--c1:#1a1a2e;--c2:#00b894;--c3:#e0f7f4;--c4:#f5f6f8;--r:12px;--s:0 2px 8px rgba(0,0,0,.06)}
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--c4);color:var(--c1);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px}
.container{max-width:860px;margin:0 auto;padding:0 12px}
header{text-align:center;padding:24px 0 10px}
header h1{font-size:1.25rem;font-weight:700}
header p{font-size:.8rem;color:#888;margin-top:3px}
.nav-bar{display:flex;gap:6px;background:#f0f2f7;border-radius:14px;padding:5px;margin:10px auto 0;justify-content:center;max-width:480px}
.nav-bar a{flex:1;text-align:center;text-decoration:none;padding:7px 6px;border-radius:10px;font-size:.75rem;font-weight:600;color:#999;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:4px}
.nav-bar a:hover{color:#666;background:rgba(255,255,255,.5)}
.nav-bar a.active{background:#fff;color:var(--c1);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:700}
.nav-bar a svg{width:14px;height:14px;flex-shrink:0}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--s);padding:18px;margin-bottom:12px}
.card h2{font-size:.95rem;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:7px}
.card h2 svg{width:16px;height:16px;color:var(--c2);flex-shrink:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.three{grid-template-columns:1fr 1fr 1fr}
.row.four{grid-template-columns:1fr 1fr 1fr 1fr}
.g{display:flex;flex-direction:column;gap:2px}
.g label{font-size:.7rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.2px}
.g input,.g select{padding:8px 10px;border:1.5px solid #e8eaf0;border-radius:8px;font-size:.85rem;background:#fafbfc;outline:none;width:100%;transition:all .2s}
.g input:focus,.g select:focus{border-color:var(--c2);background:#fff;box-shadow:0 0 0 3px rgba(0,184,148,.1)}
.g input[readonly]{font-weight:700;color:var(--c1);cursor:default;background:#f8f9fc;text-align:center}
.g input[type=range]{padding:0;border:none;background:transparent;accent-color:var(--c2)}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1}
.range-row .val{font-size:.8rem;font-weight:600;color:var(--c2);min-width:50px;text-align:right}

/* Cards */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.method-card{border:1.5px solid #e8eaf0;border-radius:10px;padding:12px;text-align:center;transition:all .3s;position:relative;background:#fff}
.method-card:hover{border-color:var(--c2);box-shadow:0 2px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.method-card .name{font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:4px}
.method-card .price{font-size:1.25rem;font-weight:800;color:var(--c2)}
.method-card .detail{font-size:.68rem;color:#888;margin-top:2px;line-height:1.4}
.method-card .tags{margin-top:5px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.62rem;font-weight:600}
.tag.fast{background:#ffeaa7;color:#b7950b}
.tag.normal{background:#dfe6e9;color:#636e72}
.tag.slow{background:#fab1a0;color:#c0392b}
.tag.best{background:#55efc4;color:#006266}
.badge-best{position:absolute;top:-8px;right:-8px;background:var(--c2);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* Table */
.comp-table{font-size:.72rem;width:100%;margin-top:8px}
.comp-table th{background:#f0f2f7;padding:5px 6px;text-align:center;border:1px solid #e8eaf0;font-weight:600;color:#666;font-size:.65rem}
.comp-table td{padding:4px 6px;text-align:center;border:1px solid #eef0f7}
.comp-table tr:nth-child(even) td{background:#fafbfc}
.comp-table tr.best-row td{background:#e8f8f5;font-weight:600;color:var(--c1)}
.comp-table .carrier-logo{display:inline-block;padding:0 6px;border-radius:3px;font-size:.6rem;font-weight:700;color:#fff;margin-right:3px}

.vw-info{font-size:.75rem;background:var(--c3);color:#00695c;padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.6}
.vw-info strong{margin-right:4px}

.tip{font-size:.75rem;color:#888;background:#f8f9fc;padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.5}
footer{text-align:center;padding:18px 0;color:#aaa;font-size:.75rem}
footer a{color:#aaa;text-decoration:none}

.ad-wrap{margin:12px 0;padding:20px;background:#fafbfc;border:1px solid #eee;border-radius:12px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s}.ad-wrap:hover{border-color:#ddd}.ad-label{font-size:.6rem;color:#ccc;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}@media(max-width:640px){
.row,.row.three,.row.four{grid-template-columns:1fr}
.result-grid{grid-template-columns:1fr}
.card{padding:14px}
}
</style>

<select id="fromP"><option value="sz">🇨🇳 深圳</option><option value="sh">🇨🇳 上海</option><option value="gz">🇨🇳 广州</option><option value="nb">🇨🇳 宁波</option><option value="bj">🇨🇳 北京</option><option value="yw">🇨🇳 义乌</option><option value="hk">🇭🇰 香港</option></select></div>
<div class="g"><label>目的地</label>
<select id="toC">
<optgroup label="北美"><option value="us">🇺🇸 美国</option><option value="ca">🇨🇦 加拿大</option><option value="mx">🇲🇽 墨西哥</option></optgroup>
<optgroup label="欧洲"><option value="eu">🇪🇺 欧盟</option><option value="uk">🇬🇧 英国</option><option value="ch">🇨🇭 瑞士</option></optgroup>
<optgroup label="亚太"><option value="jp">🇯🇵 日本</option><option value="kr">🇰🇷 韩国</option><option value="au">🇦🇺 澳大利亚</option><option value="sg">🇸🇬 新加坡</option><option value="my">🇲🇾 马来西亚</option><option value="th">🇹🇭 泰国</option><option value="vn">🇻🇳 越南</option><option value="ph">🇵🇭 菲律宾</option><option value="id">🇮🇩 印尼</option></optgroup>
<optgroup label="中东非洲"><option value="ae">🇦🇪 阿联酋</option><option value="sa">🇸🇦 沙特</option><option value="za">🇿🇦 南非</option></optgroup>
<optgroup label="南美"><option value="br">🇧🇷 巴西</option><option value="cl">🇨🇱 智利</option></optgroup>
</select></div>
</div>

<div class="g"><label>重量 (kg)</label><input type="number" id="wgt" value="5" min="0.1" step="0.1"></div>
<div class="g"><label>长 (cm)</label><input type="number" id="len" value="30" min="1" step="1"></div>
<div class="g"><label>宽 (cm)</label><input type="number" id="wid" value="20" min="1" step="1"></div>
<div class="g"><label>高 (cm)</label><input type="number" id="hei" value="15" min="1" step="1"></div>
</div>
<div class="row three">
<div class="g"><label>体积重系数</label><select id="dimF">
<option value="5000">5000 (DHL/FedEx/TNT)</option>
<option value="6000">6000 (UPS空运)</option>
<option value="7000">7000 (EMS)</option>
<option value="4000">4000 (小包专线)</option>
</select></div>

<div class="range-row">

<select id="peak"><option value="0">无</option><option value="5">+5% (11-12月)</option><option value="10">+10% (春节前)</option></select></div>
</div>

<div class="g"><label>服务级别</label>
<select id="svcLvl"><option value="express" selected>国际快递 (Express)</option><option value="economy">经济服务 (Economy)</option><option value="standard">标准服务 (Standard)</option></select></div>
<div class="g"><label>📍 地址类型</label>

<div class="g"><label>🛡️ 保险</label>
<select id="insOpt"><option value="0">不需要</option><option value="0.5">保额 0.5%</option><option value="1">保额 1.0%</option><option value="1.5">保额 1.5%</option></select></div>
<div class="g"><label>保额 (USD)</label><input type="number" id="insAmt" value="200" min="0" step="100"></div>
</div>

<script>
// Zone mapping: country -> zone (1-8)
var Z = {us:4,ca:4,mx:8,eu:5,uk:6,ch:5,jp:2,kr:2,au:3,sg:2,my:2,th:2,vn:2,ph:2,id:2,ae:7,sa:7,za:7,br:8,cl:8};

// Express rates per kg by weight break [<21, 21-45, 45-70, 70-100, 100-300]
// Each carrier: [Zone][break_index]
var DR = {
  dhl:{1:[22,18,15,13,11],2:[18,14,12,10,9],3:[20,16,13,11,10],4:[28,22,18,16,14],5:[26,20,17,15,13],6:[27,21,18,16,14],7:[30,24,20,18,16],8:[35,28,24,22,20]},
  fedex:{1:[20,16,14,12,10],2:[16,13,11,9,8],3:[18,14,12,10,9],4:[25,20,17,15,13],5:[23,18,15,13,12],6:[24,19,16,14,13],7:[27,22,18,16,14],8:[32,26,22,20,18]},
  ups:{1:[21,17,15,13,11],2:[17,14,12,10,9],3:[19,15,13,11,10],4:[26,21,18,16,14],5:[24,19,16,14,13],6:[25,20,17,15,14],7:[28,23,19,17,15],8:[33,27,23,21,19]},
  tnt:{1:[19,15,13,11,10],2:[15,12,10,9,8],3:[17,13,11,10,9],4:[24,19,16,14,12],5:[22,17,15,13,12],6:[23,18,16,14,13],7:[26,21,18,16,14],8:[30,24,21,19,17]},
  ems:{1:[16,13,11,10,9],2:[13,10,9,8,7],3:[15,12,10,9,8],4:[22,18,15,13,12],5:[20,16,14,12,11],6:[21,17,15,13,12],7:[24,19,17,15,13],8:[28,22,19,17,15]}
};

// Air freight per kg by weight break
var AR = {1:{a45:6,a100:4.5,a300:3.5,a500:2.8},2:{a45:5,a100:3.8,a300:3,a500:2.5},3:{a45:6.5,a100:5,a300:4,a500:3.2},4:{a45:8,a100:6.5,a300:5,a500:4},5:{a45:7,a100:5.5,a300:4.5,a500:3.5},6:{a45:7.5,a100:6,a300:5,a500:4},7:{a45:9,a100:7,a300:5.5,a500:4.5},8:{a45:12,a100:9,a300:7,a500:5.5}};

// Sea LCL per CBM
var SR = {us:85,ca:90,eu:65,uk:70,jp:45,kr:40,au:60,sg:40,my:45,th:45,vn:45,ph:50,id:55,ae:55,sa:60,za:80,br:120,cl:100,mx:95,ch:70};

// Rail per kg (Europe only)
var RR = {eu:4.5,uk:4.8,ch:4.5};

// Economy discounts relative to express
var ECO = {dhl:0.7,fedex:0.75,ups:0.73,tnt:0.72,ems:0.85};

function $(i){return document.getElementById(i)}
function fmt(n){return "$"+n.toFixed(0).replace(/B(?=(d{3})+(?!d))/g,",")}

function calc(){
  var to=$("toC").value,w=parseFloat($("wgt").value)||0,l=parseFloat($("len").value)||0,wi=parseFloat($("wid").value)||0,h=parseFloat($("hei").value)||0;
  var dim=parseInt($("dimF").value),fuel=parseFloat($("fuel").value)/100,peak=parseFloat($("peak").value)/100;
  var svc=$("svcLvl").value,addr=$("addrType").value,insOpt=parseFloat($("insOpt").value)/100,insAmt=parseFloat($("insAmt").value)||0,pcs=parseInt($("pcs").value)||1;
  var zone=Z[to]||4,resAdd=addr==="res"?28:0;
  var volW=l*wi*h/dim,chargeW=Math.max(w,volW)*pcs,wAct=w*pcs;
  var peakMul=1+peak,fuelMul=1+fuel;
  var svcTxt={express:"Express",economy:"Economy",standard:"Standard"};
  var svcTime={express:{fast:"3-5天",eco:"4-7天",std:"5-10天"},economy:{fast:"5-8天",eco:"6-10天",std:"8-14天"},standard:{fast:"7-12天",eco:"8-15天",std:"10-20天"}};

  // Volumetric weight display
  $("vwText").innerHTML="实际重 "+wAct.toFixed(1)+"kg / 体积重 "+volW.toFixed(1)+"kg (系数"+dim+") / 计费重 <strong>"+chargeW.toFixed(1)+"kg</strong>";

  // Weight break
  function wb(x){if(x<=21)return 0;if(x<=45)return 1;if(x<=70)return 2;if(x<=100)return 3;return 4}
  var idx=wb(chargeW);
  
  // Freight calculation
  function calcFreight(rate,div){
    var vw=l*wi*h/div,ch=Math.max(w,vw)*pcs;
    return ch*rate*fuelMul*peakMul;
  }

  var results=[];
  
  // DHL
  if(zone&&DR.dhl[zone]){
    var base=DR.dhl[zone][idx]*chargeW*fuelMul;
    var total=base+resAdd;
    if(insOpt>0&&insAmt>0)total+=insAmt*insOpt;
    results.push({c:"DHL Express",s:svcTxt[svc],p:svc==="economy"?base*ECO.dhl+resAdd:svc==="express"?total:total*0.9,time:svcTime[svc].fast,clr:"#ffcc00",tg:"fast",tgN:"最快",d:5000});
  }
  // FedEx
  if(zone&&DR.fedex[zone]){
    var base=DR.fedex[zone][idx]*chargeW*fuelMul;
    var total=base+resAdd;
    if(insOpt>0&&insAmt>0)total+=insAmt*insOpt;
    results.push({c:"FedEx",s:svcTxt[svc],p:svc==="economy"?base*ECO.fedex+resAdd:svc==="express"?total:total*0.92,time:svcTime[svc].fast,clr:"#4d148c",tg:"fast",tgN:"快速",d:5000});
  }
  // UPS
  if(zone&&DR.ups[zone]){
    var base=DR.ups[zone][idx]*chargeW*fuelMul;
    var total=base+resAdd;
    if(insOpt>0&&insAmt>0)total+=insAmt*insOpt;
    results.push({c:"UPS",s:svcTxt[svc],p:svc==="economy"?base*ECO.ups+resAdd:svc==="express"?total:total*0.92,time:svcTime[svc].fast,clr:"#351c15",tg:"fast",tgN:"快速",d:6000});
  }
  // TNT
  if(zone&&DR.tnt[zone]){
    var base=DR.tnt[zone][idx]*chargeW*fuelMul;
    var total=base+resAdd;
    if(insOpt>0&&insAmt>0)total+=insAmt*insOpt;
    results.push({c:"TNT",s:svcTxt[svc],p:svc==="economy"?base*ECO.tnt+resAdd:svc==="express"?total:total*0.9,time:svcTime[svc].eco,clr:"#e30613",tg:"normal",tgN:"经济",d:5000});
  }
  // EMS
  if(zone&&DR.ems[zone]){
    var emsIdx=Math.min(idx,DR.ems[zone].length-1);
    var base=DR.ems[zone][emsIdx]*chargeW*fuelMul;
    var total=base+resAdd;
    if(insOpt>0&&insAmt>0)total+=insAmt*insOpt;
    results.push({c:"EMS",s:svcTxt[svc],p:svc==="economy"?base*ECO.ems+resAdd:svc==="express"?total:total*0.88,time:svcTime[svc].std,clr:"#2d3436",tg:"normal",tgN:"经济",d:7000});
  }
  // Air freight
  if(AR[zone]&&chargeW>=10){
    var ar=AR[zone];var airRate=chargeW>=500?ar.a500:chargeW>=300?ar.a300:chargeW>=100?ar.a100:ar.a45;
    var base=airRate*chargeW*fuelMul+25;
    results.push({c:"空运普货",s:"经济",p:base+resAdd,time:"7-14天",clr:"#00b894",tg:"normal",tgN:"经济",d:5000});
  }
  // Sea LCL
  if(SR[to]){
    var cbm=l*wi*h/1000000;if(cbm<0.5)cbm=0.5;
    var sea=SR[to]*cbm+35+resAdd;
    results.push({c:"海运LCL",s:"整柜/拼箱",p:sea,time:"25-40天",clr:"#0984e3",tg:"slow",tgN:"最省",d:0});
  }
  // Rail
  if(RR[to]){
    var rail=RR[to]*chargeW+20+resAdd;
    results.push({c:"铁路运输",s:"中欧班列",p:rail,time:"15-22天",clr:"#6c5ce7",tg:"best",tgN:"性价比",d:5000});
  }

  // Sort and mark best
  results.sort(function(a,b){return a.p-b.p});
  if(results.length>0)results[0].best=true;

  // Render cards
  var grid=$("resultGrid"),cHtml="";
  for(var i=0;i<results.length;i++){
    var r=results[i];
    cHtml+='<div class="method-card"'+(r.best?' style="border-color:var(--c2)"':'')+'>';
    if(r.best)cHtml+='<div class="badge-best">★</div>';
    cHtml+='<div class="name" style="color:'+r.clr+'">'+r.c+"</div>";
    cHtml+='<div class="price">'+fmt(r.p)+"</div>";
    cHtml+='<div class="detail">'+r.s+" · "+r.time+'</div>';
    cHtml+='<div class="tags"><span class="tag '+r.tg+'">'+r.tgN+"</span></div></div>";
  }
  grid.innerHTML=cHtml;

  // Render table
  var tb=$("compBody"),tHtml="";
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var total=r.p,transport=total;
    var extras="";if(fuel>0)extras+="燃油+"+(fuel*100).toFixed(0)+"% ";if(peak>0)extras+="旺季+"+(peak*100).toFixed(0)+"% ";if(resAdd>0)extras+="住宅+"+resAdd;if(extras==="")extras="无";
    tHtml+='<tr'+(r.best?' class="best-row"':'')+'>';
    tHtml+='<td><span class="carrier-logo" style="background:'+r.clr+'">'+r.c.charAt(0)+"</span>"+r.c+"</td>";
    tHtml+="<td>"+r.s+"</td><td>"+fmt(total)+"</td><td style='font-size:.65rem;color:#888'>"+extras+"</td>";
    tHtml+="<td>"+fmt(total)+"</td><td>"+r.time+"</td>";
    tHtml+="<td>"+chargeW.toFixed(1)+"kg</td></tr>";
  }
  tb.innerHTML=tHtml;
}

document.addEventListener("DOMContentLoaded",function(){
  calc();
  var inputs=["fromP","toC","wgt","len","wid","hei","dimF","peak","svcLvl","addrType","pcs","insOpt","insAmt"];
  inputs.forEach(function(i){$(i).addEventListener("input",calc);$(i).addEventListener("change",calc)});
  $("fuel").addEventListener("input",function(){var v=parseFloat(this.value);$("fuelVal").textContent=v.toFixed(1)+"%";calc()});
});
</script>
