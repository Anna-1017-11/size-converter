<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>跨境运费估算器 - DHL/FedEx/UPS/空运/海运比价</title>
<meta name="description" content="跨境电商专业运费估算工具，支持DHL、FedEx、UPS国际快递比价，含体积重、燃油附加费和时效参考。">
<style>
:root{--c1:#1a1a2e;--c2:#00b894;--c3:#e0f7f4;--c4:#f5f6f8;--r:12px;--s:0 2px 8px rgba(0,0,0,.06)}
*,:after,:before{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--c4);color:var(--c1);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px}
.container{max-width:860px;margin:0 auto;padding:0 12px}
header{text-align:center;padding:24px 0 10px}
header h1{font-size:1.25rem;font-weight:700}
header p{font-size:.8rem;color:#888;margin-top:3px}
.nav-bar{display:flex;gap:6px;background:#f0f2f7;border-radius:14px;padding:5px;margin:10px auto 0;justify-content:center;max-width:480px}
.nav-bar a{flex:1;text-align:center;text-decoration:none;padding:7px 6px;border-radius:10px;font-size:.75rem;font-weight:600;color:#999;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:4px}
.nav-bar a:hover{color:#666;background:rgba(255,255,255,.5)}
.nav-bar a.active{background:#fff;color:var(--c1);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:700}
.nav-bar a svg{width:14px;height:14px;flex-shrink:0}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--s);padding:18px;margin-bottom:12px}
.card h2{font-size:.95rem;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:7px}
.card h2 svg{width:16px;height:16px;color:var(--c2);flex-shrink:0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row.three{grid-template-columns:1fr 1fr 1fr}
.row.four{grid-template-columns:1fr 1fr 1fr 1fr}
.g{display:flex;flex-direction:column;gap:2px}
.g label{font-size:.7rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.2px}
.g input,.g select{padding:8px 10px;border:1.5px solid #e8eaf0;border-radius:8px;font-size:.85rem;background:#fafbfc;outline:none;width:100%;transition:all .2s}
.g input:focus,.g select:focus{border-color:var(--c2);background:#fff;box-shadow:0 0 0 3px rgba(0,184,148,.1)}
.g input[readonly]{font-weight:700;color:var(--c1);cursor:default;background:#f8f9fc;text-align:center}
.g input[type=range]{padding:0;border:none;background:transparent;accent-color:var(--c2)}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1}
.range-row .val{font-size:.8rem;font-weight:600;color:var(--c2);min-width:50px;text-align:right}

/* Result grid */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.method-card{border:1.5px solid #e8eaf0;border-radius:10px;padding:12px;text-align:center;transition:all .3s;position:relative;background:#fff}
.method-card:hover{border-color:var(--c2);box-shadow:0 2px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.method-card .name{font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:4px}
.method-card .price{font-size:1.25rem;font-weight:800;color:var(--c2);transition:color .3s}
.method-card .detail{font-size:.68rem;color:#888;margin-top:2px}
.method-card .tags{margin-top:5px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.62rem;font-weight:600}
.tag.fast{background:#ffeaa7;color:#b7950b}
.tag.normal{background:#dfe6e9;color:#636e72}
.tag.slow{background:#fab1a0;color:#c0392b}
.tag.best{background:#55efc4;color:#006266}
.tag.badge-best{position:absolute;top:-8px;right:-8px;background:var(--c2);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* Comparison table */
.comp-table{font-size:.72rem;width:100%;margin-top:8px}
.comp-table th{background:#f0f2f7;padding:5px 6px;text-align:center;border:1px solid #e8eaf0;font-weight:600;color:#666;font-size:.65rem}
.comp-table td{padding:4px 6px;text-align:center;border:1px solid #eef0f7}
.comp-table tr:nth-child(even) td{background:#fafbfc}
.comp-table .best-row td{background:#e8f8f5;font-weight:600}
.comp-table .vweight{color:#888;font-size:.68rem;margin-top:4px;background:#f8f9fc;padding:4px 8px;border-radius:4px;display:inline-block}

.tip{font-size:.75rem;color:#888;background:#f8f9fc;padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.5}

footer{text-align:center;padding:18px 0;color:#aaa;font-size:.75rem}
footer a{color:#aaa;text-decoration:none}

@media(max-width:640px){
.row,.row.three,.row.four{grid-template-columns:1fr}
.result-grid{grid-template-columns:1fr}
.card{padding:14px}
}
</style>
</head>
<body>
<div class="container">

<header>
<h1>跨境运费估算器</h1>
<p>DHL · FedEx · UPS · 空运 · 海运 · 铁路 — 含燃油附加费和体积重</p>
<div class="nav-bar">
<a href="./"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17h18l1-5-3-6-9 2-3 5H3"/><path d="M3 17v2"/><path d="M21 17v2"/></svg>尺寸换算</a>

<a href="./shipping.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>运费估算</a>
</div>
</header>

<div class="card">
<h2><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>运费计算</h2>
<div class="row">
<div class="g"><label>始发地</label>
<select id="fromP">
<option value="sz">🇨🇳 深圳</option><option value="sh">🇨🇳 上海</option><option value="gz">🇨🇳 广州</option>
<option value="nb">🇨🇳 宁波</option><option value="bj">🇨🇳 北京</option><option value="yw">🇨🇳 义乌</option>
<option value="hk">🇭🇰 香港</option>
</select>
</div>
<div class="g"><label>目的地</label>
<select id="toC">
<optgroup label="北美"><option value="us">🇺🇸 美国</option><option value="ca">🇨🇦 加拿大</option><option value="mx">🇲🇽 墨西哥</option></optgroup>
<optgroup label="欧洲"><option value="eu">🇪🇺 欧盟</option><option value="uk">🇬🇧 英国</option><option value="ch">🇨🇭 瑞士</option></optgroup>
<optgroup label="亚太"><option value="jp">🇯🇵 日本</option><option value="kr">🇰🇷 韩国</option><option value="au">🇦🇺 澳大利亚</option>
<option value="sg">🇸🇬 新加坡</option><option value="my">🇲🇾 马来西亚</option><option value="th">🇹🇭 泰国</option>
<option value="vn">🇻🇳 越南</option><option value="ph">🇵🇭 菲律宾</option><option value="id">🇮🇩 印尼</option></optgroup>
<optgroup label="中东非洲"><option value="ae">🇦🇪 阿联酋</option><option value="sa">🇸🇦 沙特</option><option value="za">🇿🇦 南非</option></optgroup>
<optgroup label="南美"><option value="br">🇧🇷 巴西</option><option value="cl">🇨🇱 智利</option></optgroup>
</select>
</div>
</div>
<div class="row four">
<div class="g"><label>重量 (kg)</label><input type="number" id="wgt" value="5" min="0.1" step="0.1"></div>
<div class="g"><label>长 (cm)</label><input type="number" id="len" value="30" min="1" step="1"></div>
<div class="g"><label>宽 (cm)</label><input type="number" id="wid" value="20" min="1" step="1"></div>
<div class="g"><label>高 (cm)</label><input type="number" id="hei" value="15" min="1" step="1"></div>
</div>
<div class="row three">
<div class="g"><label>体积重系数</label><select id="dimFactor">
<option value="5000">5000（DHL/FedEx标准）</option>
<option value="6000">6000（UPS部分线路）</option>
<option value="4000">4000（小包专线）</option>
</select></div>
<div class="g"><label>燃油附加费</label>
<div class="range-row">
<input type="range" id="fuel" min="10" max="35" value="18" step="0.5">
<span class="val" id="fuelVal">18.0%</span>
</div>
</div>
<div class="g"><label>旺季附加费</label>
<select id="peak">
<option value="0">无</option><option value="5">+5%（11-12月）</option><option value="10">+10%（春节前）</option>
</select>
</div>
</div>

<div id="vwInfo" class="tip" style="background:#e0f7f4;color:#00695c"><strong>📐 体积重：</strong> <span id="vwText">计算中...</span></div>

<div class="result-grid" id="resultGrid"></div>

<div style="overflow-x:auto;margin-top:8px">
<table class="comp-table" id="compTable">
<thead><tr><th>方式</th><th>承运商</th><th>估算费用</th><th>时效</th><th>体积重</th><th>计费重</th></tr></thead>
<tbody id="compBody"></tbody>
</table>
</div>

<div class="tip"><strong>⚠️ 重要提醒：</strong>以上为预估算价格，含燃油附加费和旺季附加费。实际运费以物流商最终报价为准。体积重=长×宽×高÷系数，计费重量取实际重量与体积重的较大值。</div>
</div>

</div>
<footer>跨境运费估算器 &copy; 2026 &mdash; <a href="privacy.html">隐私政策</a> &mdash; <a href="disclaimer.html">免责声明</a></footer>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx" crossorigin></script>
<script>
// Zone mapping: country -> zone number (for express rates)
var ZONES = {us:4,ca:4,mx:8,eu:5,uk:6,ch:5,jp:2,kr:2,au:3,sg:2,my:2,th:2,vn:2,ph:2,id:2,ae:7,sa:7,za:7,br:8,cl:8};
// Express rates per kg at weight breaks [<21kg, 21-45kg, 45-70kg, 70-100kg, 100-300kg]
// Key: zone_index -> {dhl, fedex, ups}
var EXPRATES = {
1:{dhl:[22,18,15,13,11],fedex:[20,16,14,12,10],ups:[21,17,15,13,11]},
2:{dhl:[18,14,12,10,9],fedex:[16,13,11,9,8],ups:[17,14,12,10,9]},
3:{dhl:[20,16,13,11,10],fedex:[18,14,12,10,9],ups:[19,15,13,11,10]},
4:{dhl:[28,22,18,16,14],fedex:[25,20,17,15,13],ups:[26,21,18,16,14]},
5:{dhl:[26,20,17,15,13],fedex:[23,18,15,13,12],ups:[24,19,16,14,13]},
6:{dhl:[27,21,18,16,14],fedex:[24,19,16,14,13],ups:[25,20,17,15,14]},
7:{dhl:[30,24,20,18,16],fedex:[27,22,18,16,14],ups:[28,23,19,17,15]},
8:{dhl:[35,28,24,22,20],fedex:[32,26,22,20,18],ups:[33,27,23,21,19]}
};
// Air freight: per kg by weight break
var AIRRATES = {1:{a45:6,a100:4.5,a300:3.5,a500:2.8},2:{a45:5,a100:3.8,a300:3,a500:2.5},3:{a45:6.5,a100:5,a300:4,a500:3.2},
4:{a45:8,a100:6.5,a300:5,a500:4},5:{a45:7,a100:5.5,a300:4.5,a500:3.5},6:{a45:7.5,a100:6,a300:5,a500:4},
7:{a45:9,a100:7,a300:5.5,a500:4.5},8:{a45:12,a100:9,a300:7,a500:5.5}};
// Sea LCL per CBM
var SEARATES = {us:85,ca:90,eu:65,uk:70,jp:45,kr:40,au:60,sg:40,my:45,th:45,vn:45,ph:50,id:55,ae:55,sa:60,za:80,br:120,cl:100,mx:95,ch:70};
// Rail per kg (Europe only)
var RAILRATES = {eu:4.5,uk:4.8,ch:4.5};

var $ = function(i){return document.getElementById(i)};
var CARRIERS = [
  {id:"dhl",name:"DHL Express",color:"#ffcc00",mode:"express",divisor:5000},
  {id:"fedex",name:"FedEx",color:"#4d148c",mode:"express",divisor:5000},
  {id:"ups",name:"UPS",color:"#351c15",mode:"express",divisor:6000},
  {id:"air",name:"空运",color:"#00b894",mode:"air",divisor:5000},
  {id:"sea",name:"海运 LCL",color:"#0984e3",mode:"sea",divisor:0},
  {id:"rail",name:"铁路",color:"#6c5ce7",mode:"rail",divisor:5000}
];

function calc() {
  var to=$(toC).value,w=parseFloat($(wgt).value)||0,l=parseFloat($(len).value)||0,wi=parseFloat($(wid).value)||0,h=parseFloat($(hei).value)||0;
  var dim=parseInt($(dimFactor).value),fuel=parseFloat($(fuel).value)/100,peak=parseFloat($(peak).value)/100;
  var zone=ZONES[to]||4;
  var volW=l*wi*h/dim;
  var chargeW=Math.max(w,volW);
  var peakMul=1+peak,fuelMul=1+fuel;
  
  // Volumetric weight info
  var vwMode={5000:"DHL/FedEx标准",6000:"UPS标准",4000:"小包专线"};
  $("vwText").innerHTML="实际重 "+w.toFixed(1)+"kg / 体积重 "+volW.toFixed(1)+"kg (系数"+dim+") / 计费重 <strong>"+chargeW.toFixed(1)+"kg</strong>";

  // Calculate weight break
  function wb(w) {if(w<=21) return 0; if(w<=45) return 1; if(w<=70) return 2; if(w<=100) return 3; return 4;}
  var idx=wb(chargeW);
  
  var results = [];
  
  // DHL, FedEx, UPS
  if (zone && EXPRATES[zone]) {
    var er=EXPRATES[zone];
    var dhlRate=er.dhl[idx]*chargeW*fuelMul*peakMul;
    var fedexRate=er.fedex[idx]*chargeW*fuelMul*peakMul;
    var upsRate=chargeW<=21?er.ups[idx]*chargeW*fuelMul*peakMul:(er.ups[Math.min(idx, er.ups.length-1)]*chargeW*fuelMul*peakMul);
    
    results.push({c:"DHL Express",p:dhlRate,time:"3-6天",tag:"fast",tagName:"最快",d:5000});
    results.push({c:"FedEx",p:fedexRate,time:"4-7天",tag:"fast",tagName:"快速",d:5000});
    results.push({c:"UPS",p:upsRate,time:"4-7天",tag:"fast",tagName:"快速",d:6000});
  }
  
  // Air freight
  if (AIRRATES[zone]) {
    var ar=AIRRATES[zone];var airRate;
    if(chargeW>=500) airRate=ar.a500;else if(chargeW>=300) airRate=ar.a300;else if(chargeW>=100) airRate=ar.a100;else airRate=ar.a45;
    airRate=airRate*chargeW*fuelMul;
    // Plus document/handling fee
    airRate+=25;
    results.push({c:"空运 (普货)",p:airRate,time:"7-14天",tag:"normal",tagName:"经济",d:5000});
  }
  
  // Sea freight
  if (SEARATES[to]) {
    var cbm=l*wi*h/1000000;if(cbm<0.5)cbm=0.5;
    var seaRate=SEARATES[to]*cbm+35;
    results.push({c:"海运 LCL",p:seaRate,time:"30-45天",tag:"slow",tagName:"最省",d:0});
  }
  
  // Rail freight
  if (RAILRATES[to]) {
    var railRate=RAILRATES[to]*chargeW+20;
    results.push({c:"铁路运输",p:railRate,time:"15-22天",tag:"best",tagName:"性价比",d:5000});
  }
  
  // Find best
  results.sort(function(a,b){return a.p-b.p});
  if(results.length>0) results[0].best=true;
  
  // Render cards
  var grid=$("resultGrid");
  var html="";
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var fm="$"+r.p.toFixed(0).replace(/B(?=(d{3})+(?!d))/g,",");
    var volNote=r.d>0?"<span class=tag\ info>体"+(chargeW*1).toFixed(1)+"kg</span>":"<span class=tag\ info>体"+cbm.toFixed(2)+"m³</span>";
    html+='<div class="method-card">';
    if(r.best) html+='<div class="badge-best">★</div>';
    html+='<div class="name">'+r.c+'</div>';
    html+='<div class="price">'+fm+'</div>';
    html+='<div class="detail">'+r.time+' · 门到门</div>';
    html+='<div class="tags"><span class="tag '+r.tag+'">'+r.tagName+'</span></div>';
    html+='</div>';
  }
  grid.innerHTML=html;
  
  // Render comparison table
  var tb=$("compBody");
  var tr="";
  for(var i=0;i<results.length;i++){
    var r=results[i];
    var fm="$"+r.p.toFixed(0).replace(/B(?=(d{3})+(?!d))/g,",");
    var vwNote=r.d>0?(chargeW*1).toFixed(1)+"kg":"—";
    var cls=r.best?"class=best-row":"";
    tr+="<tr "+cls+"><td>"+(r.best?"★ 推荐":"")+"</td><td>"+r.c+"</td><td>"+fm+"</td><td>"+r.time+"</td><td>"+vwNote+"</td><td>"+chargeW.toFixed(1)+"kg</td></tr>";
  }
  tb.innerHTML=tr;
}

document.addEventListener("DOMContentLoaded",function(){
  calc();
  ["fromP","toC","wgt","len","wid","hei","dimFactor","fuel","peak"].forEach(function(i){$(i).addEventListener("input",calc);$(i).addEventListener("change",calc)});
  $("fuel").addEventListener("input",function(){var v=parseFloat(this.value);$("fuelVal").textContent=v.toFixed(1)+"%";calc()});
});
</script>
</body>
</html>
