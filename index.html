function updateClo(){var c=document.querySelector("#cloCat").value,v=parseFloat($("cloV").value);if(isNaN(v)){["cloCN","cloUS","cloEU","cloUK","cloINTL","cloJP"].forEach(function(i){$(i).value="鈥?});return}var b=null;for(var i=0;i<C[c].r.length;i++){var r=C[c].r[i];if(v>=r.cn[0]&&v<=r.cn[1]){b=r;break}}if(!b){var md=Infinity;for(var i=0;i<C[c].r.length;i++){var r=C[c].r[i],d=Math.abs(v-(r.cn[0]+r.cn[1])/2);if(d<md){md=d;b=r}}}if(b){$("cloCN").value=b.cn[0]+"-"+b.cn[1];$("cloUS").value=b.us;$("cloEU").value=b.eu[0]+"-"+b.eu[1];$("cloUK").value=b.uk;$("cloINTL").value=b.l;$("cloJP").value=b.jp}}

// Units
function uc(i,f,t,r,tab){var v=parseFloat($(i).value);if(isNaN(v)){$(r).value="鈥?;return}$(r).value=String(+(v*tab[$(f).value]/tab[$(t).value]).toFixed(4))}
function temp(){var v=parseFloat($("tempV").value);if(isNaN(v)){$("tempR").value="鈥?;return}var f=$("tempF").value,t=$("tempT").value,c=f==="c"?v:(v-32)*5/9;$("tempR").value=(t==="c"?c:c*9/5+32).toFixed(1)+"掳"+(t==="c"?"C":"F")}

// Init
document.addEventListener("DOMContentLoaded",function(){
buildChart("male");updateShoe();updateClo();
uc("lenV","lenF","lenT","lenR",L);uc("wV","wF","wT","wR",W);temp();
["shoeV","shoeF","shoeT"].forEach(function(i){$(i).addEventListener("input",updateShoe)});
$("shoeSwap").addEventListener("click",function(){var f=$("shoeF"),t=$("shoeT");f.value=[t.value,t.value=f.value][0];updateShoe()});
["cloV","cloCat"].forEach(function(i){$(i).addEventListener("input",updateClo)});
["lenV","lenF","lenT"].forEach(function(i){$(i).addEventListener("input",function(){uc("lenV","lenF","lenT","lenR",L)})});
["wV","wF","wT"].forEach(function(i){$(i).addEventListener("input",function(){uc("wV","wF","wT","wR",W)})});
["tempV","tempF","tempT"].forEach(function(i){$(i).addEventListener("input",temp)});
});
