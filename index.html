function sd(g){return SHOE[g]||SHOE.male}
function cs(v,f,t,g){var d=sd(g),a=d[f],b=d[t];if(!a||!b||!a.length)return null;var bi=0,bd=Infinity;a.forEach(function(x,i){var ad=Math.abs(Number(x)-Number(v));if(ad<bd){bd=ad;bi=i}});return bi<b.length?b[bi]:b[b.length-1]}
function us(){var g=qs("#shoe-gender .sub-tab.active").dataset.value,v=parseFloat($("shoe-from").value),f=$("shoe-from-system").value,t=$("shoe-to-system").value;if(isNaN(v)){$("shoe-result").value="—";$("shoe-all-sizes").value="—";return}var r=cs(v,f,t,g);$("shoe-result").value=r!=null?String(r):"—";var a={};["cn","eu","us","uk","jp"].forEach(function(s){var z=cs(v,f,s,g);a[s]=z!=null?String(z):"—"});$("shoe-all-sizes").value="CN:"+a.cn+" EU:"+a.eu+" US:"+a.us+" UK:"+a.uk+" JP:"+a.jp}
function bsc(g){var d=sd(g==="kids"?"male":g),tb=$("shoe-chart-body");if(!tb)return;var n=Math.min(d.cn.length,d.eu.length,d.us.length,d.uk.length,d.jp.length),h="";for(var i=0;i<n;i++){h+="<tr>";h+="<td>"+(d.cn[i]!=null?d.cn[i]:"—")+"</td>";h+="<td>"+(d.eu[i]!=null?d.eu[i]:"—")+"</td>";h+="<td>"+(d.us[i]!=null?d.us[i]:"—")+"</td>";h+="<td>"+(d.uk[i]!=null?d.uk[i]:"—")+"</td>";h+="<td>"+(d.jp[i]!=null?d.jp[i]:"—")+"</td>";h+="</tr>"}tb.innerHTML=h}
function uc(i,f,t,r,tab){var v=parseFloat($(i).value);if(isNaN(v)){$(r).value="—";return}var s=String(v*tab[$(f).value]/tab[$(t).value]);$(r).value=s}
function uc2(){var v=parseFloat($("temp-input").value);if(isNaN(v)){$("temp-result").value="—";return}var f=$("temp-from").value,t=$("temp-to").value,c=f==="c"?v:(v-32)*5/9,r=t==="c"?c:c*9/5+32;$("temp-result").value=r.toFixed(2)+"°"+(t==="c"?"C":"F")}
function ucAll(){uc("length-input","length-from","length-to","length-result",LEN);uc("weight-input","weight-from","weight-to","weight-result",WGT);uc("volume-input","volume-from","volume-to","volume-result",VOL);uc2()}
function be(){["shoe-from","shoe-from-system","shoe-to-system"].forEach(function(i){$(i).addEventListener("input",us);$(i).addEventListener("change",us)});$("shoe-swap").addEventListener("click",function(){var f=$("shoe-from-system"),t=$("shoe-to-system");f.value=[t.value,t.value=f.value][0];us()});document.addEventListener("sc",function(e){if(e.detail.id==="shoe-gender"){us();bsc(e.detail.v)}if(e.detail.id==="shoe-chart-gender"){bsc(e.detail.v)}if(e.detail.id==="clothing-category"){ucl()}});["clothing-input","clothing-measure"].forEach(function(i){$(i).addEventListener("input",ucl);$(i).addEventListener("change",ucl)});var ug=[["length-input","length-from","length-to","length-result",LEN],["weight-input","weight-from","weight-to","weight-result",WGT],["volume-input","volume-from","volume-to","volume-result",VOL]];ug.forEach(function(x){[x[0],x[1],x[2]].forEach(function(i){$(i).addEventListener("input",function(){uc(x[0],x[1],x[2],x[3],x[4])});$(i).addEventListener("change",function(){uc(x[0],x[1],x[2],x[3],x[4])})})});["temp-input","temp-from","temp-to"].forEach(function(i){$(i).addEventListener("input",uc2);$(i).addEventListener("change",uc2)})}
function ucl(){var c=qs("#clothing-category .sub-tab.active").dataset.value,v=parseFloat($("clothing-input").value);if(isNaN(v)){["clothing-cn","clothing-us","clothing-eu","clothing-uk","clothing-intl","clothing-jp"].forEach(function(i){$(i).value="—"});return}var b=null;for(var i=0;i<CLOTHING[c].ranges.length;i++){var r=CLOTHING[c].ranges[i];if(v>=r.cn[0]&&v<=r.cn[1]){b=r;break}}if(!b){var md=Infinity;for(var i=0;i<CLOTHING[c].ranges.length;i++){var r=CLOTHING[c].ranges[i],d=Math.abs(v-(r.cn[0]+r.cn[1])/2);if(d<md){md=d;b=r}}}if(b){$("clothing-cn").value=b.cn[0]+"-"+b.cn[1]+" cm";$("clothing-us").value=b.us;$("clothing-eu").value=b.eu[0]+"-"+b.eu[1];$("clothing-uk").value=b.uk;$("clothing-intl").value=b.intl;$("clothing-jp").value=b.jp}}
document.addEventListener("DOMContentLoaded",function(){it();ist();bsc("male");us();ucl();ucAll();be()});
})();
